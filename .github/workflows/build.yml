name: Build Android APK

on:
  workflow_dispatch: # 允许我们手动点击按钮开始打包

jobs:
  build:
    runs-on: ubuntu-latest # 使用国外的 Linux 服务器
    steps:
      - name: 下载代码
        uses: actions/checkout@v4
      
      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 安装 Flet 和你的依赖库
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 执行终极打包
        run: flet build apk
        
      - name: 输出并保存 APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: build/apk/*.apk
